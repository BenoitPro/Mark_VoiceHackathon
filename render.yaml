services:
  - type: web
    name: mark-api
    runtime: node
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @mark/contracts build && pnpm --filter @mark/server build
    startCommand: pnpm --filter @mark/server start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: WEB_ORIGIN
        sync: false
      - key: WEB_ORIGINS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: COMPOSIO_API_KEY
        sync: false
      - key: COMPOSIO_CONNECT_CALLBACK_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SPEECHMATICS_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: STRIPE_CHECKOUT_URL
        sync: false
      - key: PAID_USER_EMAILS
        sync: false
